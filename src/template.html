<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
</head>
<body>
    <div class="sidebar">
        <button class="add-project">+ Add Project</button>
        <div class="all-project-container">

        </div>
    </div>
    <div class="main">
        <button class="add-todo">+ Add Todo</button>
        <div class="all-todo-container">

        </div>
        <div class="dialog">
            <dialog class="form-dialog">
                <form method="dialog" class="dialog-form">
                    <p>
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title" 
                            placeholder="" required>
                    </p>
                    <p>
                        <label for="description">Description:</label>
                        <textarea id="description" name="description"
                            placeholder="" required></textarea>
                    </p>
                    <p>
                        <label for="due_date">Due Date:</label>
                        <input type="date" id="due_date" required>
                    </p>
                    <p>
                        <label for="priority">Priority:</label>
                        <select name="priority" id="priority" value="Medium">
                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>
                        </select>
                    </p>
                    <div class="form-button">
                        <button type="submit">Add/Update</button>
                        <button class="close-dialog" type="button">Cancel</button>
                    </div>
                </form>
            </dialog>
            <dialog class="alert-dialog">
                <div class="alert-container">
                    <p class="alert-message"></p>
                    <button class="alert-close">Close</button>
                </div>
            </dialog>
            <dialog class="warning-dialog">
                <div class="warning-container">
                    <p class="warning-message"></p>
                    <div class="button-group">
                        <button class="comfirm">Confirm</button>
                        <button class="cancel">Cancel</button>
                    </div>
                </div>
            </dialog>
        </div>
    </div>
</body>
</html>
